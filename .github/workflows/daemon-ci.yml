name: Daemon CI

on:
  pull_request:
    paths:
      - "daemon/**"
      - "tasks/daemon.toml"
      - "mise.toml"
      - ".github/workflows/daemon-ci.yml"
  push:
    branches: [main]
    paths:
      - "daemon/**"
      - "tasks/daemon.toml"
      - "mise.toml"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
        with:
          install: true
          cache: true
      - run: mise run daemon:lint
      - run: mise run daemon:test
