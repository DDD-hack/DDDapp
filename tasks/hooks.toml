["hooks:build"]
dir         = "hooks"
description = "ddd-hook バイナリをビルドします"
run         = "go build -o ../bin/ddd-hook ."

["hooks:lint"]
dir         = "hooks"
description = "hooks の静的解析を実行します"
run         = "go vet ./..."

["hooks:install"]
description = "pre-commit / prepare-commit-msg hook をインストールします"
run         = """
cp hooks/pre-commit .git/hooks/pre-commit
chmod +x .git/hooks/pre-commit
cp hooks/prepare-commit-msg .git/hooks/prepare-commit-msg
chmod +x .git/hooks/prepare-commit-msg
echo "✅ pre-commit + prepare-commit-msg hooks installed"
"""

["hooks:uninstall"]
description = "pre-commit / prepare-commit-msg hook をアンインストールします"
run         = """
rm -f .git/hooks/pre-commit .git/hooks/prepare-commit-msg
echo "✅ hooks uninstalled"
"""

["heartrate"]
description = "現在の心拍数を取得して ECG アニメーションを表示します"
run         = "bin/ddd-hook check"
